name: Python CI
on:
  push:
  pull_request:
    

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
          
      - name: check python
        run: python --version

      - name: Run program
        run: python MorseCode.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: morsecode
          path: MorseCode.py
          
      - name: CI Success
        run: echo "Python CI pipeline finished" 
