name: testmorsecode
on:
  push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - name: check python
        run: python3 --version
  test:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Print
        run: echo "test job"
  deploy:
    runs-on : ubuntu-latest
    needs: [build, test]
    steps:
      - name: Print
        run: echo "deploy job"
